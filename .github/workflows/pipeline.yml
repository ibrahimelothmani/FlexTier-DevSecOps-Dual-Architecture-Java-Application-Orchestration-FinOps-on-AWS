name: End-to-End Deploy Java Application on AWS 3-Tier Architecture

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    name: Build & Test Java App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Package Application
        working-directory: Java-App
        run: mvn clean package -DskipTests

  check-code-quality:
    name: SonarQube Quality Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run SonarQube Analysis
        if: "${{ secrets.SONAR_TOKEN != '' }}"
        working-directory: Java-App
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.host.url="${{ secrets.SONAR_URL }}" \
            -Dsonar.login="${{ secrets.SONAR_TOKEN }}" \
            -Dsonar.exclusions="**/src/test/**"

      - name: Skip SonarQube Analysis (Fallback)
        if: "${{ secrets.SONAR_TOKEN == '' }}"
        run: |
          echo "⚠️ SonarQube token is not configured. Skipping code quality analysis step."

  build-scan-and-push:
    name: Build, Scan with Trivy, & Push Image
    runs-on: ubuntu-latest
    needs: check-code-quality
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image locally first for Trivy scanning
      - name: Build Docker Image
        run: |
          docker build -t java-app:latest ./Java-App

      # Trivy Vulnerability Scan (Fails pipeline on high/critical issues)
      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'java-app:latest'
          format: 'table'
          exit-code: '1' # Fails build if issues are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Optional Docker Hub login & push (Executes only if secrets are configured)
      - name: Login to Docker Hub
        if: "${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_PASSWORD != '' }}"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push to Docker Hub
        if: "${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_PASSWORD != '' }}"
        run: |
          docker tag java-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/java-app:latest
          docker tag java-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/java-app:sha-${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-app:sha-${{ github.sha }}

      # AWS Credentials Configuration (Supports OIDC and Static Keys)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Ensure ECR repo exists; does not throw EntityAlreadyExistsException
      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories --repository-names java-app --region ${{ secrets.AWS_REGION }} || \
          aws ecr create-repository \
            --repository-name java-app \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ secrets.AWS_REGION }}

      - name: Tag and Push Image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag java-app:latest $ECR_REGISTRY/java-app:latest
          docker tag java-app:latest $ECR_REGISTRY/java-app:sha-${{ github.sha }}
          docker push $ECR_REGISTRY/java-app:latest
          docker push $ECR_REGISTRY/java-app:sha-${{ github.sha }}

  deploy-infrastructure:
    name: Pulumi Infrastructure Provisioning
    runs-on: ubuntu-latest
    needs: build-scan-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install Pulumi Stack Dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run Pulumi Preview (Stack dry-run)
        uses: pulumi/actions@v5
        with:
          command: preview
          work-dir: infrastructure
          stack-name: dev
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Run Pulumi Up (Apply infrastructure changes)
        if: github.ref == 'refs/heads/main'
        uses: pulumi/actions@v5
        with:
          command: up
          work-dir: infrastructure
          stack-name: dev
          args: --yes
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}