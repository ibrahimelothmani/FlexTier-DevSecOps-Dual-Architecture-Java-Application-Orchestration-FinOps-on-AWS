apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: default
type: Opaque
stringData:
  username: DB_USERNAME_PLACEHOLDER
  password: DB_PASSWORD_PLACEHOLDER
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
  namespace: default
  labels:
    app: java-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
      annotations:
        # Telemetry Scraping for Prometheus Setup
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: java-app-container
          image: java-app:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              value: "DB_HOST_PLACEHOLDER"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "UserDB"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          # Resource requests and limits to prevent noisy neighbor scenarios
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          # System health checking (Liveness & Readiness Probes)
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: java-app-service
  namespace: default
spec:
  selector:
    app: java-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      name: http
  type: LoadBalancer
