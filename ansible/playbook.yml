---
- name: Bootstrap K3s Single-Node Cluster
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Wait for target host to become reachable
      wait_for_connection:
        delay: 5
        timeout: 300

    - name: Install system prerequisites
      apt:
        name:
          - curl
          - ca-certificates
          - apt-transport-https
        state: present
        update_cache: yes

    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_bin

    - name: Download and install K3s
      shell: "curl -sfL https://get.k3s.io | sh -"
      environment:
        INSTALL_K3S_EXEC: "--write-kubeconfig-mode 644 --disable traefik"
      when: not k3s_bin.stat.exists

    - name: Wait for K3s node to be ready
      shell: "/usr/local/bin/kubectl get nodes"
      register: nodes_status
      until: '" Ready " in nodes_status.stdout'
      retries: 10
      delay: 5

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0700'

    - name: Copy kubeconfig to ubuntu user home
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Configure kubeconfig with public IP address
      replace:
        path: /home/ubuntu/.kube/config
        regexp: '127.0.0.1'
        replace: "{{ ansible_host }}"

    - name: Verify K3s installation and access
      become: no
      command: kubectl get nodes
      register: k3s_check
      changed_when: false

    - name: Show cluster status
      debug:
        var: k3s_check.stdout_lines
