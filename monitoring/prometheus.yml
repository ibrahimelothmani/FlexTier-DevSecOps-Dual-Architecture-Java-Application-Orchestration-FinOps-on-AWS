global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

# Alertmanager configuration (Optional integration)
alerting:
  alertmanagers:
  - static_configs:
    - targets:
      # - alertmanager:9093

# Load rules once and periodically evaluate them according to global evaluation_interval.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # 1. Prometheus Self-monitoring
  - job_name: 'prometheus'
    static_configs:
    - targets: ['localhost:9090']

  # 2. Infrastructure Server Metrics (Node Exporter)
  - job_name: 'node-exporter'
    static_configs:
    - targets: ['node-exporter:9100']

  # 3. Dynamic Kubernetes Pod Scraper
  # Scrapes metrics from Pods with annotations matching:
  #   prometheus.io/scrape: "true"
  #   prometheus.io/path: "/actuator/prometheus"
  #   prometheus.io/port: "8080"
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_pod_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
